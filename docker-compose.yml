networks:
  app-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  casdoor_data:
    driver: local
  redis_data:
    driver: local

services:
  # ============================================================================
  # APISIX API 网关
  # ============================================================================
  apisix:
    image: apache/apisix:3.17.0-debian
    container_name: app-apisix
    restart: unless-stopped
    environment:
      APISIX_STAND_ALONE: "true"
      APISIX_WORKER_PROCESSES: "auto"
    ports:
      - "9080:9080"
      - "9443:9443"
      - "9180:9180"
    volumes:
      - ./apisix/config.yaml:/usr/local/apisix/conf/config.yaml:ro
      - ./apisix/apisix.yaml:/usr/local/apisix/conf/apisix.yaml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app-net
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9080/apisix/status"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================================
  # PostgREST API 自动生成引擎
  # ============================================================================
  postgrest:
    image: postgrest/postgrest:v14.15
    container_name: app-postgrest
    restart: unless-stopped
    environment:
      PGRST_DB_URI: postgres://authenticator:${AUTHENTICATOR_PASSWORD:-authenticator_dev_pass}@host.docker.internal:6432/app_db?sslmode=disable
      PGRST_DB_SCHEMAS: "api_v1"
      PGRST_DB_ANON_ROLE: web_anon
      PGRST_DB_EXTRA_SEARCH_PATH: "public"
      PGRST_JWT_SECRET: ${JWKS_JSON:-{"keys":[{"kty":"oct","kid":"dev-hs256","alg":"HS256","k":"c2VjcmV0X2RldmVsb3BtZW50X2tleV9hdF9sZWFzdF9zZXZlbl9jaGFyYWN0ZXJzIQ=="}]}}
      PGRST_DB_PRE_REQUEST: "api_v1.check_token_blacklist"
      PGRST_OPENAPI_SERVER_PROXY_URI: "http://localhost:3001"
      PGRST_SERVER_HOST: "0.0.0.0"
      PGRST_SERVER_PORT: "3000"
      PGRST_DB_AGGREGATES_ENABLED: "true"
      PGRST_MAX_ROWS: "1000"
      PGRST_PRE_ERROR_EXTENDED: "true"
      PGRST_DB_TX_END: "commit"
    ports:
      - "3001:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "curl", "-f", "-s", "http://localhost:3000/"]
      interval: 15s
      timeout: 10s
      retries: 5

  # ============================================================================
  # Casdoor IAM/OAuth 认证服务
  # ============================================================================
  casdoor:
    image: casbin/casdoor:v1.680.0
    container_name: app-casdoor
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      driverName: postgres
      dataSourceName: "user=casdoor password=${CASDOOR_DB_PASSWORD:-casdoor_dev_pass} host=host.docker.internal port=6432 sslmode=disable dbname=casdoor"
      runMode: dev
      httpPort: 8000
    volumes:
      - casdoor_data:/app/conf
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "curl", "-f", "-s", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ============================================================================
  # Swagger UI API 文档
  # ============================================================================
  swagger-ui:
    image: swaggerapi/swagger-ui:v5.2.0
    container_name: app-swagger
    restart: unless-stopped
    environment:
      API_URL: "http://localhost:3001/"
    ports:
      - "8082:8080"
    networks:
      - app-net
    depends_on:
      postgrest:
        condition: service_healthy

  # ============================================================================
  # Policy Syncer (策略同步器)
  # ============================================================================
  syncer:
    build:
      context: ./syncer
      dockerfile: Dockerfile
    container_name: policy-syncer
    restart: unless-stopped
    environment:
      DB_HOST: host.docker.internal
      DB_PORT: "6432"
      DB_USER: app_owner
      DB_PASSWORD: ${DB_PASSWORD:-dev_password_change_me}
      SSL_MODE: disable
      APISIX_ADMIN_URL: http://apisix:9180/apisix/admin/plugin_metadata/authz-casbin
      APISIX_ADMIN_KEY: ${APISIX_ADMIN_KEY:-a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6}
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app-net
    depends_on:
      apisix:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ============================================================================
  # Redis (APISIX 限流 / Casdoor 缓存)
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: app-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
