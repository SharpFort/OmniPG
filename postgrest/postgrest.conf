# ==============================================================================
# PostgREST 配置文件（开发环境）
# Schema 隔离版本 — 支持多 Schema（Swagger 按模块分组）
# ==============================================================================

# ------------------------------------------------------------------------------
# 数据库连接 URI（通过 Pgbouncer 连接）
# ------------------------------------------------------------------------------
db-uri = "postgres://authenticator:***@pgbouncer:6432/app_db?sslmode=disable"

# ------------------------------------------------------------------------------
# 暴露的 Schema（PostgREST 自动映射为 API 路径和 Swagger Tag）
# ------------------------------------------------------------------------------
# 多 Schema 配置（逗号分隔）：
# - api_v1_sys:     系统管理模块（用户/角色/权限/菜单/审计）
# - api_v1_sales:   销售域模块（订单/客户/账单）
# - api_v1_inventory: 库存域模块（库存/仓储/物流）
#
# 每个 Schema 在 Swagger UI 中显示为独立的 Tag，可筛选
db-schemas = "api_v1_sys, api_v1_sales, api_v1_inventory"

# ------------------------------------------------------------------------------
# 额外的搜索路径（Schema 隔离关键配置）
# ------------------------------------------------------------------------------
# 搜索路径顺序：
# 1. api_v1_sys:     系统管理 API 函数（优先级最高）
# 2. api_v1_sales:   销售域 API 函数
# 3. api_v1_inventory: 库存域 API 函数
# 4. public:         系统管理模块（sys 模块的表和函数）
# 5. sales:          销售域内部对象
# 6. inventory:      库存域内部对象
# 7. pg_temp:        临时对象（PostgREST 内部使用）
#
# ⚠️ 重要：
# - api_v1_* 必须在 public/sales/inventory 前面，确保优先找到 API 包装函数
# - 添加新模块时必须同步更新此配置
db-extra-search-path = "api_v1_sys, api_v1_sales, api_v1_inventory, public, sales, inventory, pg_temp"

# ------------------------------------------------------------------------------
# 匿名角色（未认证用户切换到此角色）
# ------------------------------------------------------------------------------
db-anon-role = "web_anon"

# ------------------------------------------------------------------------------
# JWT 验证密钥
# ------------------------------------------------------------------------------
jwt-secret = "$(JWKS_JSON)"

# ------------------------------------------------------------------------------
# 请求前拦截：检查 Token 黑名单
# ------------------------------------------------------------------------------
db-pre-request = "api_v1_sys.check_token_blacklist"

# ------------------------------------------------------------------------------
# 服务端配置
# ------------------------------------------------------------------------------
server-host = "0.0.0.0"
server-port = 3000

# ------------------------------------------------------------------------------
# OpenAPI 代理 URI（用于 Swagger UI）
# ------------------------------------------------------------------------------
openapi-server-proxy-uri = "http://localhost:3000"

# ------------------------------------------------------------------------------
# 聚合函数允许（支持 count、sum 等）
# ------------------------------------------------------------------------------
db-aggregates-enabled = true

# ------------------------------------------------------------------------------
# 最大返回行数
# ------------------------------------------------------------------------------
max-rows = 1000

# ------------------------------------------------------------------------------
# 错误级别
# ------------------------------------------------------------------------------
pre-error-extended = true

# ------------------------------------------------------------------------------
# 事务结束方式
# ------------------------------------------------------------------------------
db-tx-end = "commit"

# ------------------------------------------------------------------------------
# JWT 角色 Claim 键名
# ------------------------------------------------------------------------------
jwt-role-claim-key = "roles[0]"

# ------------------------------------------------------------------------------
# 日志级别
# ------------------------------------------------------------------------------
log-level = warn

# ------------------------------------------------------------------------------
# CORS 配置（由 APISIX 网关处理）
# ------------------------------------------------------------------------------
cors-origins = ""
