# ==============================================================================
# PostgREST 配置文件（开发环境）
# Schema 隔离版本 — 支持多 Schema 搜索路径
# ==============================================================================

# ------------------------------------------------------------------------------
# 数据库连接 URI（通过 Pgbouncer 连接）
# 注意：开发环境使用明码，生产环境使用 .env 或 Docker Secrets
# ------------------------------------------------------------------------------
db-uri = "postgres://authenticator:***@pgbouncer:6432/app_db?sslmode=disable"

# ------------------------------------------------------------------------------
# 暴露的 Schema（PostgREST 自动映射为 API 路径）
# ------------------------------------------------------------------------------
# 说明：PostgREST 将此列表中的 Schema 直接暴露为 API 端点
# - api_v1: 包含所有视图和 RPC 包装函数（业务入口）
db-schemas = "api_v1"

# ------------------------------------------------------------------------------
# 额外的搜索路径（Schema 隔离关键配置）
# ------------------------------------------------------------------------------
# 说明：PostgREST 在执行函数时，会按此顺序搜索对象
# 
# 搜索路径顺序（从左到右优先级递减）：
# 1. api_v1 — 优先查找 api_v1 中的函数和视图（已暴露的 Schema）
# 2. public  — 查找公共模块（sys 模块的 sys_user, sys_role 等表）
# 3. sales   — 查找销售域对象（sales.orders 等）
# 4. inventory — 查找库存域对象（inventory.stock 等）
# 5. pg_temp — 临时对象（PostgREST 内部使用）
#
# ⚠️ 重要：新模块的 Schema 必须添加到此路径中！
# 否则 api_v1 的包装函数无法调用 sales.create_order() 等函数
db-extra-search-path = "api_v1, public, sales, inventory, pg_temp"

# ------------------------------------------------------------------------------
# 匿名角色（未认证用户切换到此角色）
# ------------------------------------------------------------------------------
db-anon-role = "web_anon"

# ------------------------------------------------------------------------------
# JWT 验证密钥
# ------------------------------------------------------------------------------
# 开发环境：使用 Casdoor JWKS（需从 Casdoor 管理面板获取）
# 生产环境：使用 Casdoor JWKS JSON
jwt-secret = "$(JWKS_JSON)"

# ------------------------------------------------------------------------------
# 请求前拦截：检查 Token 黑名单
# ------------------------------------------------------------------------------
db-pre-request = "api_v1.check_token_blacklist"

# ------------------------------------------------------------------------------
# 服务端配置
# ------------------------------------------------------------------------------
server-host = "0.0.0.0"
server-port = 3000

# ------------------------------------------------------------------------------
# OpenAPI 代理 URI（用于 Swagger UI）
# ------------------------------------------------------------------------------
openapi-server-proxy-uri = "http://localhost:3000"

# ------------------------------------------------------------------------------
# 聚合函数允许（支持 count、sum 等）
# ------------------------------------------------------------------------------
db-aggregates-enabled = true

# ------------------------------------------------------------------------------
# 最大返回行数（防止全量数据查询导致 OOM）
# ------------------------------------------------------------------------------
max-rows = 1000

# ------------------------------------------------------------------------------
# 错误级别（开发环境使用 extended 获取详细信息）
# ------------------------------------------------------------------------------
pre-error-extended = true

# ------------------------------------------------------------------------------
# 事务结束方式
# ------------------------------------------------------------------------------
db-tx-end = "commit"

# ------------------------------------------------------------------------------
# JWT 角色 Claim 键名
# ------------------------------------------------------------------------------
# Casdoor 默认在 JWT 中放置 roles 数组
# "roles": ["super_admin", "role_admin"] → roles[0] 提取 "super_admin"
jwt-role-claim-key = "roles[0]"

# ------------------------------------------------------------------------------
# 日志级别
# ------------------------------------------------------------------------------
log-level = warn

# ------------------------------------------------------------------------------
# CORS 配置（PostgREST 不直接面向浏览器，由 APISIX 网关处理 CORS）
# ------------------------------------------------------------------------------
cors-origins = ""
