openapi: 3.0.3
info:
  title: OmniPG Admin API
  description: 零后端代码 Admin 管理后端 API（PostgREST + APISIX）
  version: 1.0.0
  contact:
    name: SnugglePuff

servers:
  - url: http://localhost:9080
    description: APISIX Gateway

security:
  - BearerAuth: []

paths:
  /rpc/user_login_sso:
    post:
      summary: 用户登录
      security: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                  example: admin
                password:
                  type: string
                  example: admin123
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  username:
                    type: string

  /rpc/logout:
    post:
      summary: 用户登出
      responses:
        '200':
          description: 登出成功

  /rpc/get_current_user:
    get:
      summary: 获取当前用户信息
      responses:
        '200':
          description: 用户信息
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  username:
                    type: string
                  email:
                    type: string
                  tenant_id:
                    type: string
                    format: uuid
                  roles:
                    type: array
                    items:
                      type: string

  /rpc/search_users:
    get:
      summary: 分页搜索用户
      parameters:
        - name: p_query
          in: query
          schema:
            type: string
        - name: p_status
          in: query
          schema:
            type: string
            enum: [active, inactive]
        - name: p_limit
          in: query
          schema:
            type: integer
            default: 20
        - name: p_offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: 用户列表

  /rpc/create_user:
    post:
      summary: 创建用户
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [p_username, p_password, p_tenant_id]
              properties:
                p_username:
                  type: string
                p_password:
                  type: string
                p_tenant_id:
                  type: string
                  format: uuid
                p_dept_id:
                  type: string
                  format: uuid
                p_email:
                  type: string
                p_phone:
                  type: string
      responses:
        '200':
          description: 新用户 UUID

  /rpc/assign_role_to_user:
    post:
      summary: 分配角色
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required: [p_user_id, p_role_id]
              properties:
                p_user_id:
                  type: string
                  format: uuid
                p_role_id:
                  type: string
                  format: uuid
      responses:
        '200':
          description: 成功

  /rpc/get_dept_tree:
    get:
      summary: 获取部门树
      parameters:
        - name: p_tenant_id
          in: query
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: 部门树

  /rpc/get_user_menu:
    get:
      summary: 获取当前用户菜单树
      responses:
        '200':
          description: 菜单树（含按钮权限）

  /rpc/get_online_users:
    get:
      summary: 获取在线用户
      parameters:
        - name: p_limit
          in: query
          schema:
            type: integer
            default: 50
        - name: p_offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: 在线用户列表

  /rpc/search_audit_log:
    get:
      summary: 搜索审计日志
      parameters:
        - name: p_query
          in: query
          schema:
            type: string
        - name: p_table_name
          in: query
          schema:
            type: string
        - name: p_operation
          in: query
          schema:
            type: string
            enum: [INSERT, UPDATE, DELETE]
        - name: p_limit
          in: query
          schema:
            type: integer
            default: 20
        - name: p_offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        '200':
          description: 审计日志列表

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      properties:
        code:
          type: string
        message:
          type: string
        details:
          type: string
        hint:
          type: string

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
        phone:
          type: string
        tenant_id:
          type: string
          format: uuid
        dept_id:
          type: string
          format: uuid
        is_active:
          type: boolean
        roles:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Role:
      type: object
      properties:
        id:
          type: string
          format: uuid
        role_code:
          type: string
        role_name:
          type: string
        tenant_id:
          type: string
          format: uuid
        description:
          type: string
        is_active:
          type: boolean

    Department:
      type: object
      properties:
        id:
          type: string
          format: uuid
        dept_name:
          type: string
        tenant_id:
          type: string
          format: uuid
        parent_id:
          type: string
          format: uuid
        sort_order:
          type: integer
        is_active:
          type: boolean
